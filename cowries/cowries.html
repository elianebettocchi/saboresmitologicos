<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incorporeal Cowrie Roller</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="cowries.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body class="fundo">
    <div class="container py-5">
        <div class="row pt-5">
            <div class="col-lg-4 pt-5">
                <img class="img-fluid" src="regras.jpg" alt="card image">
                <button class="light"><a href="https://drive.google.com/file/d/1InfEU4_JSzA1IlhsVgR-xayA9ZUUMG1k/view?usp=share_link" target="_blank" rel="noopener noreferrer">Regras</a></button>
            </div>
            <div class="col-lg-4">
                <div class="controls">
                    <button class="message-container dark" id="message">Open:</button>
                    <img class="img-fluid small" id="cowries" onclick="playAudio()" type="image" src="cowries/cowries.png" alt="cowries image">
                    <br><i class="bi bi-hand-index display-4"></i>
                </div>
            </div>
                <div class="col-lg-4 pt-5">
                    <img class="img-fluid" src="rules.jpg" alt="card image">
                    <button class="light"><a href="https://drive.google.com/file/d/1InfEU4_JSzA1IlhsVgR-xayA9ZUUMG1k/view?usp=share_link" target="_blank" rel="noopener noreferrer">Rules</a></button>
                </div>
            </div></div>
            <audio id="myAudio">
                <source src="cowries.ogg" type="audio/ogg">
                <source src="cowries.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
              </audio>
    <script src="cowries.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
<script>
    $(function () {
      $('[data-toggle="tooltip"]').tooltip()
    });
    </script>
</body>
</html>
